<!DOCTYPE html>
<html>
<head>
    <title>Tip Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background-color: #f5f5f5;
            border-radius: 12px;
        }
        h1 {
            color: #4f7caa;
            text-align: center;
            font-family:arial;
            text-decoration : underline;
        }

        #result{
            color:rgb(183, 105, 121);
            text-align : center;
            text-decoration:underline;
        }
        input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 2px solid #3498db;
    border-radius: 8px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
    </style>
</head>
<body>
    <h1>Tip Calculator</h1>
   <input type="number" id="bill" placeholder="Bill amount">
    <input type="number" id="tip" placeholder="Tip percentage"  >
    <button id="calculate">Calculate</button>
    <p id="result"></p>

    <script>
       
    let button=document.getElementById("calculate")
       button.addEventListener("click", function() {
        let billvalue = parseFloat(document.getElementById("bill").value)
        let tip_percent = parseFloat(document.getElementById("tip").value)
        let tip_amount = (tip_percent / 100) * billvalue
        let total = billvalue + tip_amount
         document.getElementById("result").textContent ="Tip: " + tip_amount + " | Total: " + total
})
    </script>
</body>
</html>
